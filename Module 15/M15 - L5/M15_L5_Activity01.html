<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Stopwatch</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .stopwatch-container {
            text-align: center;
            background-color: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 22px;
            color: #ecf0f1;
        }

        .display {
            font-size: 60px;
            font-weight: 300;
            margin: 20px 0;
            color: #1abc9c;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        #button-start {
            background-color: #2ecc71;
            color: white;
        }

        #button-start:hover {
            background-color: #27ae60;
        }

        #button-stop {
            background-color: #e74c3c;
            color: white;
        }

        #button-stop:hover {
            background-color: #c0392b;
        }

        #button-reset {
            background-color: #f1c40f;
            color: #34495e;
        }

        #button-reset:hover {
            background-color: #f39c12;
        }
    </style>
</head>

<body>

    <div class="stopwatch-container">
        <h2>Stopwatch</h2>

        <div class="display">
            <span id="seconds">00</span>:<span id="milliseconds">00</span>
        </div>

        <div class="controls">
            <button id="button-start">Start</button>
            <button id="button-stop">Stop</button>
            <button id="button-reset">Reset</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
